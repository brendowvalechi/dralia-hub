events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;  # para upload de CSV/XLSX grandes

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Rate limiting — protege a API de abuso
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Upstream do backend
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # Upstream do frontend (container React buildado)
    upstream frontend {
        server frontend:80;
        keepalive 8;
    }

    # Upstream do Grafana
    upstream grafana {
        server grafana:3000;
        keepalive 8;
    }

    # ── HTTP → redireciona para HTTPS (descomente quando tiver SSL) ────────
    # server {
    #     listen 80;
    #     server_name seu-dominio.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── Servidor principal ─────────────────────────────────────────────────
    server {
        listen 80;
        # listen 443 ssl;
        server_name _;

        # SSL (descomente e ajuste quando tiver certificado)
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_session_cache   shared:SSL:10m;

        # Headers de segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── API Backend ─────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Auth com rate limit mais restrito
        location /api/auth/login {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass         http://backend/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Webhook Evolution API — sem rate limit (origem confiável interna)
        location /api/webhooks/ {
            proxy_pass         http://backend/webhooks/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Docs Swagger (bloquear em produção se necessário)
        location /api/docs {
            proxy_pass http://backend/docs;
            proxy_set_header Host $host;
        }
        location /api/openapi.json {
            proxy_pass http://backend/openapi.json;
            proxy_set_header Host $host;
        }

        # ── Mídia (áudios e arquivos enviados) ──────────────────────────
        location /media/ {
            proxy_pass         http://backend/media/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Frontend React (SPA) ────────────────────────────────────────
        location / {
            proxy_pass         http://frontend/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            # SPA fallback — roteamento client-side
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            rewrite ^ /index.html break;
            proxy_pass http://frontend;
        }

        # Health check sem logs
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ── Grafana (acesso restrito — apenas IPs internos ou VPN) ─────────
        location /grafana/ {
            # Descomente para restringir acesso:
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass         http://grafana/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
