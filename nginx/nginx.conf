events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS interno — re-resolve upstreams a cada 30s.
    # Sem isso, o nginx cacheia o IP do container no startup e quebra após rebuilds.
    resolver 127.0.0.11 valid=30s ipv6=off;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Servidor principal ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Variáveis forçam o nginx a usar o resolver acima em vez de cachear IPs
        set $backend  "backend:8000";
        set $frontend "frontend:80";
        set $grafana  "grafana:3000";

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Auth com rate limit restrito
        location = /api/auth/login {
            limit_req zone=auth burst=3 nodelay;

            rewrite ^ /auth/login break;
            proxy_pass         http://$backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Webhook Evolution API
        location /api/webhooks/ {
            rewrite ^/api(/.*) $1 break;
            proxy_pass         http://$backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Docs Swagger
        location /api/docs {
            rewrite ^/api(/.*) $1 break;
            proxy_pass         http://$backend;
            proxy_set_header   Host $host;
        }
        location /api/openapi.json {
            rewrite ^/api(/.*) $1 break;
            proxy_pass         http://$backend;
            proxy_set_header   Host $host;
        }

        # API Backend (geral)
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            rewrite ^/api(/.*) $1 break;
            proxy_pass         http://$backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Mídia
        location /media/ {
            proxy_pass         http://$backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # Frontend React (SPA)
        location / {
            proxy_pass         http://$frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            rewrite ^ /index.html break;
            proxy_pass http://$frontend;
        }

        # Health check
        location /health {
            rewrite ^ /health break;
            proxy_pass  http://$backend;
            access_log  off;
        }

        # Grafana
        location /grafana/ {
            proxy_pass         http://$grafana;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
