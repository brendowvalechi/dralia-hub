# Docker Compose — PRODUÇÃO
# Uso: docker-compose up -d --build
#
# Serviços:
#   postgres       — banco de dados PostgreSQL 16
#   redis          — broker Celery + cache Evolution API
#   backend        — FastAPI (2 workers uvicorn)
#   celery-worker  — processa disparos de campanhas (anti-ban, spintax)
#   celery-beat    — agendador de tarefas periódicas (reset daily_sent, etc.)
#   evolution-api  — hub WhatsApp (self-hosted)
#   nginx          — proxy reverso + serve frontend estático

services:

  # ── Banco de dados ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Cache / Broker ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── Evolution API (WhatsApp hub) ────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      SWAGGER_ENABLED: "false"
      CONFIG_SESSION_PHONE_VERSION: 2.3000.1035194821
      # Webhook global — notifica o backend quando status de mensagem muda
      WEBHOOK_GLOBAL_URL: http://backend:8000/webhooks/evolution
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Backend (FastAPI) ───────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ── Celery Worker ───────────────────────────────────────────────────────
  celery-worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "false"
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 --queues=default
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal

  # ── Celery Beat (agendador) ─────────────────────────────────────────────
  celery-beat:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "false"
    command: celery -A app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - internal

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - internal

  # ── Frontend (build estático servido pelo Nginx interno) ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dralia-frontend
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx (proxy reverso principal) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  media_data:
  nginx_logs:
  prometheus_data:
  grafana_data:
